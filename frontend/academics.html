<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Management — AEVON</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .admin-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        margin-top: 20px;
      }
      .management-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        box-shadow: var(--shadow);
      }
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: var(--text-secondary);
        font-size: 0.9rem;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      .data-table th,
      .data-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .data-table th {
        color: var(--text-secondary);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>AEVON</h2>
          <div class="user-role">Administrator</div>
        </div>
        <nav class="sidebar-nav" id="nav-links"></nav>
        <div class="sidebar-footer">
          <button
            class="btn btn-secondary"
            style="width: 100%"
            onclick="handleLogout()"
          >
            Logout
          </button>
        </div>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <div>
            <h1>Academic Management</h1>
            <p class="subtitle">
              Manage subjects, examination schedules, and class structures
            </p>
          </div>
        </div>

        <div class="admin-grid">
          <section class="management-card">
            <div class="card-header">
              <h3 style="margin: 0">Subject Management</h3>
            </div>
            <form id="add-subject-form" class="grid grid-cols-3 gap-1">
              <div class="form-group">
                <label>Subject Name</label>
                <input
                  type="text"
                  id="sub-name"
                  class="form-control"
                  placeholder="e.g. Mathematics"
                  required
                />
              </div>
              <div class="form-group">
                <label>Subject Code</label>
                <input
                  type="text"
                  id="sub-code"
                  class="form-control"
                  placeholder="e.g. MATH101"
                  required
                />
              </div>
              <div class="form-group">
                <label>Assigned Class</label>
                <select id="sub-class" class="form-control" required>
                  <option value="">Select Class</option>
                </select>
              </div>
              <button
                type="submit"
                class="btn btn-primary"
                style="grid-column: span 3"
              >
                Add Subject
              </button>
            </form>
            <div id="subject-list-container">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Subject</th>
                    <th>Code</th>
                    <th>Class</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="subject-table-body"></tbody>
              </table>
            </div>
          </section>

          <section class="management-card">
            <div class="card-header">
              <h3 style="margin: 0">Exam Scheduling</h3>
            </div>
            <form id="add-exam-form" class="grid grid-cols-4 gap-1">
              <div class="form-group">
                <label>Exam Name</label>
                <input
                  type="text"
                  id="e-name"
                  class="form-control"
                  placeholder="Mid-Term"
                  required
                />
              </div>
              <div class="form-group">
                <label>Date & Time</label>
                <input
                  type="datetime-local"
                  id="e-date"
                  class="form-control"
                  required
                />
              </div>
              <div class="form-group">
                <label>Class</label>
                <select id="e-class" class="form-control" required>
                  <option value="">Select Class</option>
                </select>
              </div>
              <div class="form-group">
                <label>Total Marks</label>
                <input
                  type="number"
                  id="e-total"
                  class="form-control"
                  value="100"
                  min="1"
                  required
                />
              </div>
              <div class="form-group" style="grid-column: span 4">
                <label>Description (Optional)</label>
                <textarea
                  id="e-desc"
                  class="form-control"
                  rows="2"
                  placeholder="e.g. Topics covered: Calculus and Geometry"
                ></textarea>
              </div>
              <button
                type="submit"
                class="btn btn-primary"
                style="grid-column: span 4"
              >
                Schedule Exam
              </button>
            </form>
            <div id="exam-list-container">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Exam</th>
                    <th>Date</th>
                    <th>Class</th>
                    <th>Status</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="exam-table-body"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="js/app.js"></script>
    <script>
      requireAuth(["admin"])

      let classes = []
      let classSubjects = {}

      async function init() {
        renderSidebar("academics.html")
        await loadClasses()
        await loadSubjects()
        await loadExams()
      }

      async function loadClasses() {
        const res = await AnalyticsAPI.getClasses()
        classes = res.classes

        const subSelect = document.getElementById("sub-class")
        const examSelect = document.getElementById("e-class")

        const html =
          '<option value="">Select Class</option>' +
          classes
            .map((c) => `<option value="${c.id}">${c.name}</option>`)
            .join("")

        subSelect.innerHTML = html
        examSelect.innerHTML = html
      }

      async function loadSubjects() {
        const res = await AnalyticsAPI.getSubjectsAll()
        const tbody = document.getElementById("subject-table-body")
        tbody.innerHTML = res.subjects
          .map(
            (s) => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.code}</td>
                    <td><span class="badge badge-info">${s.class_name || "All"}</span></td>
                    <td><button class="btn-danger" onclick="deleteSubject('${s.id}')">Delete</button></td>
                </tr>
            `,
          )
          .join("")
      }

      async function loadExams() {
        const { exams } = await AdminAPI.getExams()
        const tbody = document.getElementById("exam-table-body")
        tbody.innerHTML = exams
          .map(
            (e) => `
                <tr>
                    <td>
                        <div style="font-weight:600;">${e.name}</div>
                        <div style="font-size:0.75rem; color:var(--text-secondary);">Total: ${e.total_marks} | ${e.description || "No description"}</div>
                    </td>
                    <td>${new Date(e.date).toLocaleString([], { dateStyle: "short", timeStyle: "short" })}</td>
                    <td><span class="badge badge-info">${e.class_name}</span></td>
                    <td><span class="badge ${e.status === "completed" ? "badge-success" : e.status === "ongoing" ? "badge-warning" : "badge-secondary"}">${e.status.toUpperCase()}</span></td>
                    <td><button class="btn-danger" onclick="deleteExam('${e.id}')">Delete</button></td>
                </tr>
            `,
          )
          .join("")
      }

      async function updateExamSubjectDropdown() {
        const classId = document.getElementById("e-class").value
        const subjectSelect = document.getElementById("e-subject")
        if (!subjectSelect) return
        if (!classId) {
          subjectSelect.innerHTML = ""
          return
        }
        try {
          const { subjects } = await AnalyticsAPI.getSubjects(classId)
          subjectSelect.innerHTML = subjects
            .map((s) => `<option value="${s.id}">${s.name}</option>`)
            .join("")
        } catch (err) {
          console.error("Failed to load subjects:", err)
          subjectSelect.innerHTML =
            '<option value="">Error loading subjects</option>'
        }
      }

      document.getElementById("add-subject-form").onsubmit = async (e) => {
        e.preventDefault()
        const name = document.getElementById("sub-name").value
        const code = document.getElementById("sub-code").value
        const class_id = document.getElementById("sub-class").value
        try {
          await AdminAPI.createSubject(name, code, class_id)
          showToast("Subject added")
          e.target.reset()
          loadSubjects()
        } catch (err) {
          showToast(err.message, "error")
        }
      }

      document.getElementById("add-exam-form").onsubmit = async (e) => {
        e.preventDefault()
        const name = document.getElementById("e-name").value
        const dateVal = document.getElementById("e-date").value
        const date = dateVal ? new Date(dateVal).toISOString() : ""
        const classId = document.getElementById("e-class").value
        const description = document.getElementById("e-desc").value
        const total_marks = document.getElementById("e-total").value

        try {
          await AdminAPI.createExam({
            name,
            date,
            class_id: classId,
            description,
            total_marks,
          })
          showToast(`Successfully scheduled exam: ${name}`)
          e.target.reset()
          loadExams()
        } catch (err) {
          showToast("Error scheduling exam: " + err.message, "error")
        }
      }

      async function deleteSubject(id) {
        if (!id || id === "[object Object]") {
          showToast("Invalid subject ID", "error")
          console.error("Invalid subject ID:", id)
          return
        }
        if (!confirm("Delete subject?")) return
        try {
          await AdminAPI.deleteSubject(id)
          showToast("Subject deleted successfully")
          loadSubjects()
        } catch (err) {
          showToast("Error deleting subject: " + err.message, "error")
          console.error("Delete error:", err)
        }
      }

      async function deleteExam(id) {
        if (!id || id === "[object Object]") {
          showToast("Invalid exam ID", "error")
          console.error("Invalid exam ID:", id)
          return
        }
        if (!confirm("Delete exam?")) return
        try {
          await AdminAPI.deleteExam(id)
          showToast("Exam deleted successfully")
          loadExams()
        } catch (err) {
          showToast("Error deleting exam: " + err.message, "error")
          console.error("Delete error:", err)
        }
      }

      init()
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner — AEVON</title>
    <meta name="description" content="Browse chapter-wise study materials, video lectures, and documents for your subjects.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ────────────────────────────────
           SUBJECT CARDS
        ──────────────────────────────── */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.1rem;
            margin-top: 1.25rem;
        }
        .subject-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.6rem 1.25rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .subject-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(59,130,246,0.1), transparent 70%);
            opacity: 0; transition: opacity 0.3s;
        }
        .subject-card:hover, .subject-card:focus {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(59,130,246,0.15);
            outline: none;
        }
        .subject-card:hover::before { opacity: 1; }
        .subject-card:active { transform: translateY(-1px); }

        .subject-icon {
            width: 58px; height: 58px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem; margin: 0 auto 0.9rem;
            background: var(--icon-bg, rgba(59,130,246,0.12));
        }
        .icon-0 { --icon-bg: rgba(59,130,246,0.12); }
        .icon-1 { --icon-bg: rgba(16,185,129,0.12); }
        .icon-2 { --icon-bg: rgba(245,158,11,0.12); }
        .icon-3 { --icon-bg: rgba(239,68,68,0.12); }
        .icon-4 { --icon-bg: rgba(99,102,241,0.12); }
        .icon-5 { --icon-bg: rgba(236,72,153,0.12); }
        .icon-6 { --icon-bg: rgba(20,184,166,0.12); }
        .icon-7 { --icon-bg: rgba(124,58,237,0.12); }

        .subject-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem; }
        .subject-code { font-size: 0.73rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .subject-cta  { display: inline-block; margin-top: 0.7rem; font-size: 0.77rem; font-weight: 600; background: rgba(59,130,246,0.1); color: var(--primary); border-radius: 20px; padding: 3px 13px; }
        .subject-arrow { position: absolute; top: 0.85rem; right: 0.85rem; opacity: 0; transform: translateX(-4px); transition: all 0.2s; color: var(--primary); font-size: 1rem; }
        .subject-card:hover .subject-arrow { opacity: 1; transform: translateX(0); }

        /* ────────────────────────────────
           CHAPTER VIEW
        ──────────────────────────────── */
        #chapter-view { display: none; animation: fadeSlide 0.28s ease; }
        @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

        .back-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-primary); padding: 0.45rem 1rem;
            border-radius: var(--radius-sm); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: var(--transition);
            margin-bottom: 1rem; text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .back-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }

        /* ── Desktop Table ── */
        .chapter-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chapter-table {
            width: 100%; border-collapse: collapse; font-size: 0.9rem;
            min-width: 580px; /* forces scroll instead of squishing on tablet */
        }
        .chapter-table thead { background: rgba(59,130,246,0.06); }
        .chapter-table th {
            padding: 12px 14px; text-align: left;
            font-size: 0.73rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--text-muted);
            border-bottom: 2px solid rgba(59,130,246,0.15);
            white-space: nowrap;
        }
        .chapter-table td {
            padding: 13px 14px; border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .chapter-table tbody tr:hover { background: rgba(59,130,246,0.03); }
        .chapter-table tbody tr:last-child td { border-bottom: none; }

        .sr-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(59,130,246,0.12); color: var(--primary);
            font-weight: 700; font-size: 0.82rem; flex-shrink: 0;
        }
        .chapter-name-text { font-weight: 600; color: var(--text-primary); }

        /* ── Mobile Chapter Cards (shown < 600px) ── */
        .chapter-cards { display: none; flex-direction: column; gap: 0.85rem; padding: 0.75rem; }
        .chapter-card {
            background: var(--bg-secondary, #f8fafc);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            position: relative;
        }
        .chapter-card-header {
            display: flex; align-items: center; gap: 0.65rem;
            margin-bottom: 0.75rem;
        }
        .chapter-card-name { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }
        .chapter-card-body { display: flex; flex-direction: column; gap: 0.55rem; }
        .chapter-card-row {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.82rem;
        }
        .chapter-card-row .label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted); min-width: 70px;
        }

        /* ── Shared action buttons ── */
        .doc-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 11px; border-radius: 20px; text-decoration: none;
            font-size: 0.79rem; font-weight: 600; transition: all 0.17s;
            white-space: nowrap;
        }
        .doc-btn-pdf  { background: rgba(239,68,68,0.1);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
        .doc-btn-pdf:hover  { background: #ef4444;  color: #fff; }
        .doc-btn-img  { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.25); }
        .doc-btn-img:hover  { background: #10b981; color: #fff; }
        .doc-btn-zip  { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
        .doc-btn-zip:hover  { background: #f59e0b; color: #fff; }
        .doc-btn-file { background: rgba(99,102,241,0.1); color: #6366f1; border: 1px solid rgba(99,102,241,0.25); }
        .doc-btn-file:hover { background: #6366f1; color: #fff; }

        .teacher-name-link {
            display: inline-flex; align-items: center; gap: 5px;
            font-weight: 700; color: var(--primary); text-decoration: none;
            padding: 4px 10px; border-radius: 20px;
            background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.18);
            transition: all 0.17s; font-size: 0.85rem; white-space: nowrap;
        }
        .teacher-name-link:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .teacher-name-plain { font-weight: 600; color: var(--text-primary); font-size: 0.85rem; }

        .desc-text {
            font-size: 0.81rem; color: var(--text-secondary);
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .na-chip { color: var(--text-muted); font-size: 0.78rem; }

        /* Empty / loading */
        .empty-state { text-align: center; padding: 2.5rem 1.5rem; color: var(--text-muted); }
        .empty-state svg { margin-bottom: 0.75rem; opacity: 0.35; }
        .empty-state h3 { font-size: 1rem; margin-bottom: 0.35rem; color: var(--text-secondary); }
        .empty-state p  { font-size: 0.85rem; }

        /* ────────────────────────────────
           RESPONSIVE BREAKPOINTS
        ──────────────────────────────── */
        @media (max-width: 600px) {
            .subject-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.85rem;
            }
            .subject-card { padding: 1.2rem 0.9rem; }
            .subject-icon { width: 48px; height: 48px; font-size: 1.4rem; margin-bottom: 0.65rem; }
            .subject-name { font-size: 0.88rem; }

            /* Hide desktop table, show card list */
            .chapter-table-wrap { display: none !important; }
            .chapter-cards { display: flex !important; }
        }

        @media (max-width: 400px) {
            .subject-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>AEVON</h2><div class="user-role">Student</div></div>
        <nav class="sidebar-nav" id="nav-links"></nav>
        <div class="sidebar-footer">
            <button class="btn btn-secondary" style="width:100%;" onclick="handleLogout()">Logout</button>
        </div>
    </aside>

    <main class="main-content">

        <!-- ── SUBJECTS VIEW ── -->
        <div id="subjects-view">
            <div class="page-header">
                <div>
                    <h1>Study Planner</h1>
                    <p class="subtitle">Tap a subject to browse chapters, documents &amp; video lectures.</p>
                </div>
            </div>

            <div id="subjects-loading" style="text-align:center;padding:3rem;color:var(--text-muted);">
                <div class="spinner"></div>
                <p style="margin-top:0.75rem;font-size:0.9rem;">Loading your subjects…</p>
            </div>

            <div id="subject-grid-container" style="display:none;">
                <div class="subject-grid" id="subject-grid"></div>
            </div>

            <div id="no-subjects" class="empty-state" style="display:none;">
                <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <h3>No Study Materials Yet</h3>
                <p>Your teacher hasn't uploaded any materials yet. Check back soon!</p>
            </div>
        </div>

        <!-- ── CHAPTERS VIEW ── -->
        <div id="chapter-view">
            <div class="page-header" style="margin-bottom:0.75rem;">
                <div style="width:100%;">
                    <button class="back-btn" onclick="showSubjects()">← Back to Subjects</button>
                    <h1 id="chapter-view-title" style="font-size:clamp(1.1rem,4vw,1.6rem);">Subject</h1>
                    <p class="subtitle" id="chapter-view-subtitle" style="font-size:0.85rem;"></p>
                </div>
            </div>

            <div class="card" style="margin-top:1rem;padding:0;overflow:hidden;">
                <div id="chapters-loading" style="text-align:center;padding:2.5rem;color:var(--text-muted);display:none;">
                    <div class="spinner"></div>
                    <p style="margin-top:0.75rem;font-size:0.9rem;">Loading chapters…</p>
                </div>

                <!-- Desktop table -->
                <div class="chapter-table-wrap">
                    <table class="chapter-table">
                        <thead>
                            <tr>
                                <th style="width:52px;">Sr.</th>
                                <th>Chapter Name</th>
                                <th>Document</th>
                                <th>YT Teacher</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody id="chapters-tbody"></tbody>
                    </table>
                </div>

                <!-- Mobile cards -->
                <div class="chapter-cards" id="chapters-cards"></div>
            </div>
        </div>

    </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    const ICON_COLORS   = ['icon-0','icon-1','icon-2','icon-3','icon-4','icon-5','icon-6','icon-7'];
    let studentClassId  = '';

    async function init() {
        const user = await requireAuth(['student']);
        if (!user) return;
        renderSidebar('study_planner.html');

        const studentId = user.student_id;
        if (!studentId) {
            document.getElementById('subjects-loading').style.display = 'none';
            document.getElementById('no-subjects').style.display = 'block';
            return;
        }
        try {
            const analytics = await AnalyticsAPI.studentAnalytics(studentId);
            studentClassId = analytics.student?.class_id || '';
            if (!studentClassId) {
                document.getElementById('subjects-loading').style.display = 'none';
                document.getElementById('no-subjects').style.display = 'block';
                return;
            }
            await loadSubjects();
        } catch (e) {
            document.getElementById('subjects-loading').style.display = 'none';
            showToast(e.message, 'error');
        }
    }

    async function loadSubjects() {
        document.getElementById('subjects-loading').style.display = 'block';
        try {
            const res = await MaterialsAPI.getSubjectsForClass(studentClassId);
            const subjects = res.subjects || [];
            document.getElementById('subjects-loading').style.display = 'none';
            if (subjects.length === 0) {
                document.getElementById('no-subjects').style.display = 'block';
            } else {
                renderSubjectCards(subjects);
                document.getElementById('subject-grid-container').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('subjects-loading').style.display = 'none';
            showToast(e.message, 'error');
        }
    }

    function renderSubjectCards(subs) {
        document.getElementById('subject-grid').innerHTML = subs.map((s, i) => {
            const initial = (s.name || '?')[0].toUpperCase();
            return `
                <div class="subject-card ${ICON_COLORS[i % ICON_COLORS.length]}" tabindex="0"
                     onclick="openSubject('${s.id}','${esc(s.name)}','${esc(s.code||'')}')"> 
                    <span class="subject-arrow">&#8250;</span>
                    <div class="subject-icon" style="font-size:1.5rem;font-weight:800;letter-spacing:-1px;">${initial}</div>
                    <div class="subject-name">${esc(s.name)}</div>
                    ${s.code ? `<div class="subject-code">${esc(s.code)}</div>` : ''}
                    <div class="subject-cta">View Chapters</div>
                </div>
            `;
        }).join('');
    }

    async function openSubject(subjectId, subjectName, subjectCode) {
        document.getElementById('subjects-view').style.display = 'none';
        document.getElementById('chapter-view').style.display  = 'block';
        document.getElementById('chapter-view-title').textContent = subjectName;
        document.getElementById('chapter-view-subtitle').textContent =
            subjectCode ? `Code: ${subjectCode}` : 'Chapter-wise study materials';

        document.getElementById('chapters-tbody').innerHTML  = '';
        document.getElementById('chapters-cards').innerHTML  = '';
        document.getElementById('chapters-loading').style.display = 'block';

        try {
            const res = await MaterialsAPI.getAll(studentClassId, subjectId);
            document.getElementById('chapters-loading').style.display = 'none';
            renderChapters(res.materials || []);
        } catch (e) {
            document.getElementById('chapters-loading').style.display = 'none';
            showToast(e.message, 'error');
        }
    }

    function renderChapters(list) {
        const tbody = document.getElementById('chapters-tbody');
        const cards = document.getElementById('chapters-cards');

        if (list.length === 0) {
            const empty = `<div class="empty-state">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <h3>No Chapters Yet</h3>
                <p>Materials for this subject haven't been uploaded yet.</p>
            </div>`;
            tbody.innerHTML = `<tr><td colspan="5">${empty}</td></tr>`;
            cards.innerHTML = empty;
            return;
        }

        let tableRows = '';
        let cardItems = '';

        list.forEach(m => {
            const docHtml    = buildDocCell(m);
            const teacherHtml = buildTeacherCell(m);
            const descHtml   = m.description
                ? `<span class="desc-text" title="${esc(m.description)}">${esc(m.description)}</span>`
                : `<span class="na-chip">—</span>`;

            // Desktop table row
            tableRows += `<tr>
                <td><span class="sr-badge">${m.chapter_no}</span></td>
                <td><span class="chapter-name-text">${esc(m.chapter_name)}</span></td>
                <td>${docHtml}</td>
                <td>${teacherHtml}</td>
                <td>${descHtml}</td>
            </tr>`;

            // Mobile card
            cardItems += `<div class="chapter-card">
                <div class="chapter-card-header">
                    <span class="sr-badge">${m.chapter_no}</span>
                    <span class="chapter-card-name">${esc(m.chapter_name)}</span>
                </div>
                <div class="chapter-card-body">
                    <div class="chapter-card-row">
                        <span class="label">Doc</span>
                        ${docHtml || '<span class="na-chip">—</span>'}
                    </div>
                    <div class="chapter-card-row">
                        <span class="label">Teacher</span>
                        ${teacherHtml || '<span class="na-chip">—</span>'}
                    </div>
                    ${m.description ? `<div class="chapter-card-row" style="align-items:flex-start;">
                        <span class="label">Note</span>
                        <span class="desc-text" style="font-size:0.82rem;">${esc(m.description)}</span>
                    </div>` : ''}
                </div>
            </div>`;
        });

        tbody.innerHTML = tableRows;
        cards.innerHTML = cardItems;
    }

    function buildDocCell(m) {
        if (!m.file_url) return `<span class="na-chip">—</span>`;
        const ext = (m.file_name || '').split('.').pop().toLowerCase();
        let cls = 'doc-btn-file', label = 'Open File', icon = iconFile();
        if (ext === 'pdf')                          { cls = 'doc-btn-pdf'; label = 'Open PDF'; icon = iconPdf(); }
        else if (['jpg','jpeg','png'].includes(ext)) { cls = 'doc-btn-img'; label = 'View Image'; icon = iconImg(); }
        else if (ext === 'zip')                      { cls = 'doc-btn-zip'; label = 'Download ZIP'; icon = iconZip(); }
        return `<a href="${esc(m.file_url)}" target="_blank" rel="noopener" class="doc-btn ${cls}">${icon}${label}</a>`;
    }

    function buildTeacherCell(m) {
        if (m.teacher_name && m.youtube_url) {
            return `<a href="${esc(m.youtube_url)}" target="_blank" rel="noopener" class="teacher-name-link" title="Watch lecture by ${esc(m.teacher_name)}">${ytIcon()}${esc(m.teacher_name)}</a>`;
        } else if (m.teacher_name) {
            return `<span class="teacher-name-plain">${esc(m.teacher_name)}</span>`;
        } else if (m.youtube_url) {
            return `<a href="${esc(m.youtube_url)}" target="_blank" rel="noopener" class="teacher-name-link">${ytIcon()}Watch Video</a>`;
        }
        return `<span class="na-chip">—</span>`;
    }

    function showSubjects() {
        document.getElementById('chapter-view').style.display  = 'none';
        document.getElementById('subjects-view').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* SVG helpers */
    function ytIcon()  { return `<svg width="15" height="15" viewBox="0 0 24 24" fill="#ef4444" style="flex-shrink:0"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.75 12.66 12.66 0 0 0-4.31-.77 12.66 12.66 0 0 0-4.31.77 4.83 4.83 0 0 1-3.77 2.75A4.78 4.78 0 0 0 2 10.5v3a4.78 4.78 0 0 0 1.43 3.81 4.83 4.83 0 0 1 3.77 2.75 12.66 12.66 0 0 0 4.31.77 12.66 12.66 0 0 0 4.31-.77 4.83 4.83 0 0 1 3.77-2.75A4.78 4.78 0 0 0 22 13.5v-3a4.78 4.78 0 0 0-2.41-3.81z"/><polygon fill="white" points="10 15 15 12 10 9 10 15"/></svg>`; }
    function iconPdf() { return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`; }
    function iconImg() { return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`; }
    function iconZip() { return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`; }
    function iconFile(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`; }

    function esc(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
</script>
</body>
</html>
